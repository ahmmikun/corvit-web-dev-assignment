<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator & Validator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Password Generator & Validator</h2>

    <input type="text" id="password" placeholder="Enter or generate password" oninput="validatePassword()" />

    <button onclick="generatePassword()">Generate Password</button>
    <button onclick="copyPassword()">Copy</button>

    <div id="strength">Strength: </div>

    <ul>
      <li id="length" class="invalid">At least 8 characters</li>
      <li id="uppercase" class="invalid">At least 1 uppercase letter</li>
      <li id="lowercase" class="invalid">At least 1 lowercase letter</li>
      <li id="number" class="invalid">At least 1 number</li>
      <li id="special" class="invalid">At least 1 special character</li>
    </ul>
  </div>

  <script src="script.js"></script>
  

</body>
</html>
