<!DOCTYPE html>
<html>
<head>
  <title>Tweet Checker</title>
</head>
<body>

<script>

let tweet = prompt("Enter your tweet:");
let length = tweet.length;

let remaining = 140 - length;
let extra = length - 140;

alert("Tweet length: " + length);
alert("Characters remaining: " + remaining);
alert("Characters over limit: " + extra);

</script>

</body>
</html>
