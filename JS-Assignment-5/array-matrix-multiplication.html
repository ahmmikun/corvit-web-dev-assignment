<!DOCTYPE html>
<html>
<body>

<script>

let m = Number(prompt("Enter number of rows"));
let n = Number(prompt("Enter number of columns"));

let result = [];

for (let i = 0; i < m; i++) {

    let row = [];

    for (let j = 0; j < n; j++) {

        row.push(i * j);

    }

    result.push(row);
}

alert(JSON.stringify(result));

</script>

</body>
</html>
