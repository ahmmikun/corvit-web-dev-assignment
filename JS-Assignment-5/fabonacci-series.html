<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Series</title>
</head>

<body>

    <script>
        let a = 0;
        let b = 1;
        let result = "0, 1";
        while (true) {
            let next = a + b;
            if (next > 50) break;
            result += ", " + next;
            a = b;
            b = next;
        }
        alert(result);
    </script>
</body>

</html>
