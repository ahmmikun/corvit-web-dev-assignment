<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validity of Passwords</title>
</head>
<body>
    
    <script>
        let password = prompt("Enter a password:");
        let isValid = true;
        if (password >= 'A' && password <= 'Z' && password >= 'a' && password <= 'z') {
            isValid = true;
        } else if (password.length > 16) {
            isValid = false;
        } else if (password >= '0' && password <= '9') {
            isValid = true;
        } else if (password === '@' || password === '!' || password === '#' || password === '$' || password === '%') {
            isValid = true;
        } else {
            isValid = false;
         
        }
        
    </script>
</body>
</html>
