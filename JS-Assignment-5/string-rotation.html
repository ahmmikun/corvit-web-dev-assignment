<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Rotation</title>
</head>

<body>

    <script>
        let arr = [1, 2, 3, 4, 5, 6, 7];
        let k = 3;

        k = k % arr.length; 

        for (let i = 0; i < k; i++) {
            let last = arr.pop();
            arr.unshift(last);
        }

        alert(arr);
    </script>
</body>

</html>
