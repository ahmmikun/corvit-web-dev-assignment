<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Pattern</title>
</head>

<body>

    <script>
        function printStarPattern() {
            let n = 9;
            let mid = (n + 1) / 2;

            for (let i = 1; i <= n; i++) {
                let stars = "";
                if (i <= mid) {
                    for (let j = 1; j <= i; j++) {
                        stars = stars + "*";
                    }
                }
                else {
                    for (let j = 1; j <= n - i + 1; j++) {
                        stars = stars + "*";
                    }
                }
                document.write(stars + "<br>");
            }
        }
        printStarPattern();
    </script>
</body>

</html>
