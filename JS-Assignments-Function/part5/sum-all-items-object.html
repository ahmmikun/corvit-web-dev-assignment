<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum All Items in Object</title>
</head>

<body>

    <script>
        function sumObjectItems() {
            let obj = {
                a: 10,
                b: 20,
                c: 30
            };
            let sum = 0;
            for (let key in obj) {
                sum = sum + obj[key];
            }
            alert("The sum of all items in the object is: " + sum);
        }
        sumObjectItems();
    </script>
</body>

</html>
