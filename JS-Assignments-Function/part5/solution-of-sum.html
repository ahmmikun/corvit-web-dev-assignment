<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution of sum</title>
</head>

<body>
    <script>
        function findIndices() {
            let nums = [2, 7, 11, 15];
            let target = 26;
            let index1, index2;
            for (let i = 0; i < nums.length; i++) {
                for (let j = i + 1; j < nums.length; j++) {
                    if (nums[i] + nums[j] === target) {
                        index1 = i;
                        index2 = j;
                        break;
                    }
                }
            }
            alert("Indices:", index1, index2);
        }
        findIndices();
    </script>
</body>

</html>
