<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers divisible by 7 and multiples of 5</title>
</head>

<body>

    <script>
        function findNumbersByCondition() {
            let result = "";
            for (let i = 1500; i < 2700; i++) {
                if (i % 7 === 0 && i % 5 === 0) {
                    result += i + " ";
                }
            }
            alert(result);
        }
        findNumbersByCondition();
    </script>
</body>

</html>
