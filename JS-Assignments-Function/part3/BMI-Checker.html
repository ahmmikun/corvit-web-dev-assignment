<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Checker</title>
</head>

<body>
    <script>
        function checkBMI() {
            let height = +prompt("Please enter your height in meters:");
            let weight = +prompt("Please enter your weight in kilograms:");
            let bmi = weight / (height * height);
            if (bmi < 16.0)
                alert("Your BMI is " + bmi + ". You are severely underweight.");
            else if (bmi >= 16.0 && bmi < 18.5)
                alert("Your BMI is " + bmi + ". You are underweight.");
            else if (bmi >= 18.5 && bmi < 25.0)
                alert("Your BMI is " + bmi + ". You have a normal weight.");
            else if (bmi >= 25.0 && bmi < 30.0)
                alert("Your BMI is " + bmi + ". You are overweight.");
            else if (bmi >= 30.0 && bmi < 35.0)
                alert("Your BMI is " + bmi + ". You are moderately obese.");
            else if (bmi >= 35.0 && bmi < 40.0)
                alert("Your BMI is " + bmi + ". You are severely obese.");
            else
                alert("Your BMI is " + bmi + ". You are morbidly obese.");
        }
        checkBMI();
    </script>
</body>

</html>
