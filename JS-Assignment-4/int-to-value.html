<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>int to value</title>
</head>
<body>
    
    <script>
        // n+nn+nnn
        let number = parseInt(prompt("Enter a number:"));
        let n = number;
        let nn = number * 10 + number;
        let nnn = number * 100 + number * 10 + number;
        let result = n + nn + nnn;
        alert("The result is: " + result);
    </script>
</body>
</html>
